<app-navbar></app-navbar>

<div class="page-container">
  
  <div class="test-groupe-container">
    
    <h1 class="title">
      <i class="fas fa-users title-icon"></i> Sélection des Groupes
    </h1>

    <div class="header-section">
      <a routerLink="/addgroup" class="btn btn-secondary">
        <i class="fas fa-plus"></i> Ajouter Groupe
      </a>
    </div>

    <div class="search-bar">
      <input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher un groupe..." />
    </div>

    <div class="group-list">
      <ng-container *ngIf="filteredGroupes.length > 0; else noGroups">
        <div class="group-card" *ngFor="let group of filteredGroupes">
          <div class="group-info">
            <h2>{{ group.nom }}</h2>
            <p><i class="fas fa-graduation-cap"></i> <strong>Promotion:</strong> {{ group.promotion }}</p>
            <p><i class="fas fa-map-marker-alt"></i> <strong>Site:</strong> {{ group.site }}</p>
            <p><i class="fas fa-calendar-alt"></i> <strong>Semestre:</strong> {{ group.semestre }}</p>
            <p><i class="fas fa-file-alt"></i> <strong>Nombre de tests:</strong> {{ group.nombre_tests }}</p>
            <p><i class="fas fa-user-graduate"></i> <strong>Nombre d'étudiants:</strong> {{ group.nombre_etudiants }}</p>
          </div>
          <div class="group-selection">
            <input 
              type="checkbox" 
              id="group-{{ group.id_groupe }}"
              [checked]="group.selected"
              [(ngModel)]="group.selected" 
              [name]="'group' + group.id_groupe" 
            />
          </div>
        </div>
      </ng-container>

      <ng-template #noGroups>
        <div class="group-card" style="justify-content: center;">
          <div class="group-info" style="text-align: center;">
            <h2 style="color: #888; font-weight: 500;">Aucun groupe trouvé pour ce site</h2>
          </div>
        </div>
      </ng-template>
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-primary" (click)="onSubmitSelection()">
        <i class="fas fa-check-circle"></i> Confirmer la sélection
      </button>
    </div>
    
  </div>
</div>
